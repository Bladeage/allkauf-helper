# docker-compose.yml — Fertighaus-Helfer
# Topologie (Abschnitt 3): WebUI extern via Nginx Proxy Manager auf Port 8081,
# Backend intern 5000, PostgreSQL intern 5432, NPM-Admin auf 81.
services:
  db:
    image: postgres:15-alpine
    container_name: alkauf-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: alkauf_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD fehlt — bitte in .env setzen}
      POSTGRES_DB: alkauf_haus
      TZ: Europe/Berlin
    volumes:
      - db_data:/var/lib/postgresql/data
    networks: [alkauf_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alkauf_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: alkauf-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://alkauf_user:${DB_PASSWORD:?DB_PASSWORD fehlt}@db:5432/alkauf_haus
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET fehlt — erzeugen via openssl rand -base64 48}
      PROTON_SMTP_USER: ${PROTON_SMTP_USER}
      PROTON_SMTP_PASSWORD: ${PROTON_SMTP_PASSWORD}
      PROTON_SMTP_SERVER: smtp.protonmail.ch
      PROTON_SMTP_PORT: 587
      MAIL_TO: ${MAIL_TO}                 # Empfänger der Erinnerungen (ihr beide)
      REMINDER_LOOKAHEAD_DAYS: 7          # konfigurierbar
      TZ: Europe/Berlin
      # --- Ergänzungen über Abschnitt 3 hinaus (für eine lauffähige App nötig) ---
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      APP_URL: ${APP_URL:-http://localhost:8081}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      ENABLE_HOUSE_MODULE: ${ENABLE_HOUSE_MODULE:-true}
      # Vertrauenswürdige Proxy-Hops: externer Reverse-Proxy → frontend-nginx → backend = 2.
      TRUST_PROXY: ${TRUST_PROXY:-2}
      # Seed-Datensatz: leer = 'custom' bevorzugt (falls vorhanden), sonst 'generic'.
      SEED_DATASET: ${SEED_DATASET:-}
      # Nutzer werden NICHT geseedet — der erste Admin wird beim ersten Start über
      # die Onboarding-Seite angelegt.
      # --- Block 4: Datei-/Foto-Ablage ---
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-15}
      # --- SSO / OIDC (Authentik) ---
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      OIDC_ALLOW_SIGNUP: ${OIDC_ALLOW_SIGNUP:-true}
    depends_on:
      db: { condition: service_healthy }
    volumes:
      - uploads_data:/app/uploads
    networks: [alkauf_net]

  frontend:
    build: ./frontend
    container_name: alkauf-frontend
    restart: unless-stopped
    # Liefert die PWA und proxyt /api -> backend:5000.
    # Direkt auf Host-Port 8081 (eigener/externer Reverse Proxy zeigt hierher).
    # Wer den gebündelten NPM nutzen will: dort Proxy-Host auf frontend:80 + Profil 'bundled-proxy'.
    ports:
      - "8081:80"
    expose: ["80"]
    depends_on:
      backend: { condition: service_healthy }
    networks: [alkauf_net]

  npm:
    # Optionaler gebündelter Reverse Proxy. Standardmäßig NICHT gestartet (eigener Proxy vorhanden).
    # Aktivieren mit:  docker compose --profile bundled-proxy up -d
    profiles: ["bundled-proxy"]
    image: jc21/nginx-proxy-manager:latest
    container_name: alkauf-npm
    restart: unless-stopped
    ports:
      - "8081:80"      # << WebUI extern auf Port 8081
      - "443:443"      # HTTPS
      - "81:81"        # NPM Admin-UI
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    environment:
      TZ: Europe/Berlin
    networks: [alkauf_net]

networks:
  alkauf_net: { driver: bridge }

volumes:
  db_data: { driver: local }
  uploads_data: { driver: local }
