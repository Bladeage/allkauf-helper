# X-Forwarded-Proto eines vorgelagerten HTTPS-Proxys durchreichen (sonst überschreibt $scheme es mit http
# und das Secure-Cookie / req.secure wäre falsch). Ohne vorgelagerten Proxy gilt $scheme.
map $http_x_forwarded_proto $alkauf_proto {
    default $scheme;
    https   https;
    http    http;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API -> Backend (gleiche Origin, daher kein CORS nötig). Backend (helmet) setzt eigene Header.
    location /api/ {
        client_max_body_size 20m;          # Datei-/Foto-Uploads (Block 4)
        # Backend dynamisch über Docker-DNS auflösen, damit ein Backend-Neustart
        # (neue Container-IP) nicht zu dauerhaften 502 führt.
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $alkauf_backend backend:5000;
        proxy_pass http://$alkauf_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $alkauf_proto;
        proxy_read_timeout 60s;
    }

    # Service Worker nicht cachen
    location = /sw.js {
        expires -1;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Gebaute Assets lange cachen (Vite hasht die Dateinamen)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # HTML-Dokument (direkt): nicht cachen + Security-Header
    location = /index.html {
        expires -1;
        include /etc/nginx/security-headers.conf;
    }

    # SPA-Fallback + statische Dateien (manifest, icons): Security-Header
    location / {
        include /etc/nginx/security-headers.conf;
        try_files $uri $uri/ /index.html;
    }
}
